name: Build and Push Snipe-IT Image

on:
  push:
    branches: [main]
    paths:
      - 'snipeit-image/**'
      - '.github/workflows/build-and-push.yml'

# OIDC needs this permission to request the token
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: cloudflow/snipeit
  ROLE_ARN: arn:aws:iam::031673483150:role/cloudflow-github-ci

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Snipe-IT source
        run: |
          git clone --depth 1 --branch v8.5.0 \
            https://github.com/grokability/snipe-it.git snipeit-image/src

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
                       -t $REGISTRY/$ECR_REPOSITORY:latest \
                       snipeit-image/
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $REGISTRY/$ECR_REPOSITORY:latest
